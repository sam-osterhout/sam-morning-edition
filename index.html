<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #F5F0E8; color: #111; -webkit-font-smoothing: antialiased; }

  header {
    background: #0B1D35;
    color: #F5F0E8;
    padding: 60px 8vw 50px;
    border-bottom: 4px solid #FFD700;
  }
  header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
    color: #FFD700;
    margin-bottom: 16px;
  }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(52px, 8vw, 100px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
  }
  header p {
    font-size: 18px;
    color: rgba(245,240,232,0.7);
    max-width: 560px;
    line-height: 1.5;
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 60px 8vw;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 700;
    color: #666;
    margin-bottom: 28px;
    padding-bottom: 12px;
    border-bottom: 1px solid #ccc;
  }

  .editions-grid {
    display: grid;
    gap: 2px;
  }

  .edition-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    padding: 24px 32px;
    text-decoration: none;
    color: #111;
    transition: background 0.15s, transform 0.15s;
    border-left: 4px solid transparent;
  }
  .edition-card:hover {
    background: #0B1D35;
    color: #F5F0E8;
    border-left-color: #FFD700;
    transform: translateX(4px);
  }
  .edition-card .date-display {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
  }
  .edition-card .edition-meta {
    font-size: 13px;
    opacity: 0.5;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .edition-card .arrow {
    font-size: 20px;
    opacity: 0.3;
    transition: opacity 0.15s;
  }
  .edition-card:hover .arrow { opacity: 1; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #999;
    font-size: 18px;
    font-style: italic;
    font-family: 'Fraunces', serif;
  }

  footer {
    text-align: center;
    padding: 40px;
    font-size: 13px;
    color: #999;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-top: 1px solid #ddd;
